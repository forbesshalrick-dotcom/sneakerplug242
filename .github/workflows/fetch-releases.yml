name: Fetch Sneaker Releases

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and save releases
        run: |
          curl -s -A "sp242-tracker/1.0" \
            "https://www.reddit.com/r/SneakerReleases/new.json?limit=5" \
            -o /tmp/reddit.json
          echo "--- First 500 chars ---"
          head -c 500 /tmp/reddit.json
          node -e "
          const fs = require('fs');
          try {
            const raw = fs.readFileSync('/tmp/reddit.json', 'utf8');
            const json = JSON.parse(raw);
            const posts = json.data.children;
            const releases = [];
            const seen = new Set();
            for (const post of posts) {
              const title = post.data.title.trim();
              const date = new Date(post.data.created_utc * 1000).toISOString().substring(0,10);
              if (!seen.has(title) && title.length > 3) {
                seen.add(title);
                releases.push({ name: title, date, status: 'pending', addedAt: new Date().toISOString() });
              }
            }
            fs.writeFileSync('releases.json', JSON.stringify(releases, null, 2));
            console.log('Saved ' + releases.length + ' releases');
          } catch(e) {
            console.error('Error:', e.message);
            fs.writeFileSync('releases.json', '[]');
          }
          "

      - name: Commit updated releases
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add releases.json
          git diff --staged --quiet || git commit -m "Update sneaker releases"
          git push
