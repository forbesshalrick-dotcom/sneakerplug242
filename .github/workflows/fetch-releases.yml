name: Fetch Sneaker Releases

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and save releases
        run: |
          node -e "
          const https = require('https');
          const fs = require('fs');

          const options = {
            hostname: 'www.reddit.com',
            path: '/r/SneakerReleases/new.json?limit=25',
            headers: { 'User-Agent': 'sp242-release-tracker/1.0' }
          };

          https.get(options, res => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', () => {
              try {
                const json = JSON.parse(data);
                const posts = json.data.children;
                const releases = [];
                const seen = new Set();
                for (const post of posts) {
                  const title = post.data.title.trim();
                  const date = new Date(post.data.created_utc * 1000).toISOString().substring(0,10);
                  const lower = title.toLowerCase();
                  if (!seen.has(title) && (lower.includes('jordan') || lower.includes('nike') || lower.includes('air max') || lower.includes('dunk') || lower.includes('yeezy') || lower.includes('release'))) {
                    seen.add(title);
                    releases.push({ name: title, date, status: 'pending', addedAt: new Date().toISOString() });
                  }
                }
                fs.writeFileSync('releases.json', JSON.stringify(releases, null, 2));
                console.log('Saved ' + releases.length + ' releases');
              } catch(e) {
                console.error('Parse error:', e.message);
                fs.writeFileSync('releases.json', '[]');
              }
            });
          }).on('error', e => {
            console.error(e);
            fs.writeFileSync('releases.json', '[]');
          });
          "

      - name: Commit updated releases
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add releases.json
          git diff --staged --quiet || git commit -m "Update sneaker releases"
          git push
